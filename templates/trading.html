{% extends "base.html" %}
{% block title %}Trading{% endblock %}
{% block content %}
<h1 class="mb-4"><i class="bi bi-graph-up"></i> AI Trading Assistant</h1>
<div class="row">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header">Signals</div>
      <div class="card-body">
        <p class="mb-1"><strong>Trend:</strong> <span id="trend-label" class="badge">—</span></p>
        <p class="mb-1"><strong>Volatility:</strong> <span id="volatility">—</span></p>
        <p class="mb-1"><strong>Risk:</strong> <span id="risk">—</span></p>
        <p class="mt-3 mb-0 text-info" id="suggestion">Loading…</p>
      </div>
    </div>
  </div>
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header">AI Insights</div>
      <div class="card-body">
        <ul class="list-group list-group-flush" id="insights-list">
          <li class="list-group-item bg-transparent">Loading…</li>
        </ul>
      </div>
    </div>
  </div>
</div>
<div class="row mt-4">
  <div class="col-12">
    <div class="card">
      <div class="card-header">Price sample (last 5)</div>
      <div class="card-body">
        <code id="prices-sample">—</code>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function() {
  function load() {
    fetch('/api/signals').then(r => r.json()).then(d => {
      document.getElementById('trend-label').textContent = (d.trend_label || '—').toUpperCase();
      document.getElementById('trend-label').className = 'badge ' + (d.trend_label === 'up' ? 'bg-success' : 'bg-danger');
      document.getElementById('volatility').textContent = (d.volatility != null) ? d.volatility + ' (' + (d.volatility_regime || '') + ')' : '—';
      document.getElementById('risk').textContent = d.risk || '—';
      document.getElementById('suggestion').textContent = d.suggestion || '—';
      document.getElementById('prices-sample').textContent = (d.prices_sample && d.prices_sample.length) ? d.prices_sample.join(', ') : '—';
    }).catch(() => {});
    fetch('/api/insights').then(r => r.json()).then(d => {
      const ul = document.getElementById('insights-list');
      ul.innerHTML = (d.insights || []).map(i => '<li class="list-group-item bg-transparent">' + (i.text || '') + '</li>').join('') || '<li class="list-group-item bg-transparent">No insights</li>';
    }).catch(() => {});
  }
  load();
  setInterval(load, 15000);
})();
</script>
{% endblock %}

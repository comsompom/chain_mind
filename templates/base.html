<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ChainMind{% endblock %} | HashKey Chain Horizon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --chain-primary: #2563eb; --chain-dark: #0f172a; --chain-card: #1e293b; --text-primary: #f1f5f9; --text-secondary: #cbd5e1; --text-muted: #94a3b8; }
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; color: var(--text-primary); }
    .navbar { background: rgba(15, 23, 42, 0.95) !important; border-bottom: 1px solid #334155; }
    .nav-link { color: var(--text-secondary) !important; }
    .nav-link:hover, .nav-link.active { color: #60a5fa !important; }
    .navbar-text, .navbar-text.text-muted { color: var(--text-secondary) !important; opacity: 1; }
    .card { background: var(--chain-card); border: 1px solid #475569; border-radius: 12px; color: var(--text-primary); }
    .card-header { background: rgba(51, 65, 85, 0.5); border-bottom: 1px solid #475569; font-weight: 600; color: var(--text-primary) !important; }
    .card-body { color: var(--text-primary); }
    .table { color: var(--text-primary); background: var(--chain-card) !important; }
    .table thead th { background: rgba(51, 65, 85, 0.8) !important; border-color: #475569; color: var(--text-secondary) !important; }
    .table tbody td { background: var(--chain-card) !important; border-color: #475569; color: var(--text-primary) !important; }
    .table-hover tbody tr:hover td { background: rgba(51, 65, 85, 0.9) !important; }
    .text-muted { color: var(--text-muted) !important; }
    .text-secondary { color: var(--text-secondary) !important; }
    .list-group-item { color: var(--text-primary) !important; background: transparent !important; border-color: #334155; }
    .list-group-item.bg-transparent { background: transparent !important; }
    main a { color: #7dd3fc; }
    main a:hover { color: #bae6fd; }
    .form-label { color: var(--text-secondary) !important; }
    .form-control, .form-select { color: var(--text-primary) !important; }
    .badge-trend-up { background: #059669; }
    .badge-trend-down { background: #dc2626; }
    .brand { font-weight: 700; color: #60a5fa; }
    h1, .h1, .fs-4 { color: var(--text-primary) !important; }
    .balance-value { color: #e8d48b !important; }
    .balance-label, .footer-note { color: var(--text-secondary) !important; }
    .footer-note a { color: #7dd3fc !important; }
    .text-info { color: #67e8f9 !important; }
    code { color: var(--text-secondary); }
    .nav-tabs .nav-link { color: var(--text-secondary); border-color: #334155; }
    .nav-tabs .nav-link:hover { color: var(--text-primary); border-color: #475569; }
    .nav-tabs .nav-link.active { color: #60a5fa; background: var(--chain-card); border-color: #475569 #475569 transparent; }
    .payment-summary-text { color: var(--text-secondary); font-size: 1rem; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand brand" href="/">ChainMind</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link {{ 'active' if request.endpoint == 'page_dashboard' or request.endpoint == 'index' }}" href="/dashboard">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link {{ 'active' if request.endpoint == 'page_trading' }}" href="/trading">Trading</a></li>
          <li class="nav-item"><a class="nav-link {{ 'active' if request.endpoint == 'page_payments' }}" href="/payments">Payments</a></li>
        </ul>
        <span class="navbar-text small text-muted">AI + DeFi + PayFi on HashKey Chain</span>
      </div>
    </div>
  </nav>
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  window.chainMindToast = function(msg, type) {
    type = type || 'primary';
    var container = document.getElementById('toast-container');
    if (!container) return;
    var id = 't' + Date.now();
    var bg = type === 'success' ? 'bg-success' : (type === 'danger' ? 'bg-danger' : 'bg-primary');
    container.insertAdjacentHTML('beforeend',
      '<div class="toast align-items-center text-white ' + bg + ' border-0" role="alert" id="' + id + '">' +
      '<div class="d-flex"><div class="toast-body">' + (msg || '') + '</div>' +
      '<button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>');
    var el = document.getElementById(id);
    if (el && typeof bootstrap !== 'undefined') {
      var t = new bootstrap.Toast(el, { delay: 4000 });
      t.show();
      el.addEventListener('hidden.bs.toast', function() { el.remove(); });
    }
  };
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
